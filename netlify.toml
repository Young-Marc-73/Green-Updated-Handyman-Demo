# Netlify config for Your Local Handyman
# Drop this file at the repo root and Netlify will pick it up automatically.

[build]
  # No build step needed — this is a static HTML site.
  publish = "."

# ----- Security & performance headers -----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/logo/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML pages — shorter cache so updates show up faster
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ----- Pretty URLs (optional — uncomment to enable) -----
# [[redirects]]
#   from = "/contact"
#   to = "/contact.html"
#   status = 200

# ----- 404 fallback -----
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
